name: Build Windows Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      APP_NAME: QuanQuanTreasureBox
      APP_DISPLAY_NAME: 泉泉的百宝箱

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Build package
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          $refName = "${{ github.ref_name }}"
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = $refName.TrimStart("v")
          } else {
            $version = "1.5.${{ github.run_number }}"
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:APP_VERSION = $version
          Write-Host "[OK] Windows product version: $version"
          python build_modern.py

      - name: Verify build output
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          $appDir = "dist\${{ env.APP_NAME }}"
          $exePath = "$appDir\${{ env.APP_NAME }}.exe"

          Write-Host "=== $appDir contents ==="
          Get-ChildItem -Recurse $appDir

          if (Test-Path $exePath) {
            Write-Host "`n[OK] ${{ env.APP_NAME }}.exe found"
            $version = [System.Diagnostics.FileVersionInfo]::GetVersionInfo((Resolve-Path $exePath))
            Write-Host "[OK] ProductName: $($version.ProductName)"
            Write-Host "[OK] FileDescription: $($version.FileDescription)"
            Write-Host "[OK] ProductVersion: $($version.ProductVersion)"
            Write-Host "[OK] FileVersion: $($version.FileVersion)"
          } else {
            Write-Error "[FAIL] $exePath not found"
            exit 1
          }

          foreach ($dir in @("Ghostscript", "runtime", "poppler_bin", "web")) {
            if (Test-Path "$appDir\$dir") {
              Write-Host "[OK] $appDir\$dir found"
            } else {
              Write-Error "[FAIL] $appDir\$dir not found"
              exit 1
            }
          }

      - name: Create zip package
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          $refName = "${{ github.ref_name }}"
          if (-not "${{ github.ref }}".StartsWith("refs/tags/")) {
            $refName = "build_${{ github.run_number }}"
          }

          $zipName = "${{ env.APP_NAME }}_${refName}_windows_x64.zip"
          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }

          Compress-Archive -Path "dist\${{ env.APP_NAME }}\*" -DestinationPath $zipName -Force
          Write-Host "[OK] Created package: $zipName"

          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: ${{ env.ZIP_NAME }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
