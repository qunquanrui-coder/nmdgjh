name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies and Build
        run: |
          cd Baibaoxiang_Web
          pip install --upgrade pip
          pip install -r requirements.txt
          python build_modern.py
        shell: cmd
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baibaoxiang
          path: Baibaoxiang_Web/dist/main/Baibaoxiang.exe
