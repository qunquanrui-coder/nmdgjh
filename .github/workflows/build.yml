name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies and Build
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python build_modern.py
      
      - name: Verify build output
        run: |
          Write-Host "=== dist/main contents ==="
          Get-ChildItem -Recurse dist\main\
          if (Test-Path "dist\main\main.exe") {
            Write-Host "`n[OK] main.exe found!"
          } else {
            Write-Error "[FAIL] main.exe NOT found"
            exit 1
          }
        shell: pwsh
      
      - name: Create Release Tag and Upload Asset
        id: release_step
        run: |
          $tag = "v$(Get-Date -Format 'yyyyMMdd.HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          
          # Create git tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag
          
          # Compress release package
          $zipName = "Baibaoxiang_$tag.zip"
          Compress-Archive -Path dist\main\* -DestinationPath $zipName -Force
          Write-Host "Package created: $zipName"
          Get-ChildItem *.zip
          
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        shell: pwsh
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_step.outputs.ZIP_NAME }}
          tag_name: ${{ steps.release_step.outputs.tag }}
