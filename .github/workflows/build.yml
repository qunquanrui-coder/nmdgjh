name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install eel PyInstaller pywin32 fitz pandas openpyxl pdfplumber docx PIL pythoncom pywintypes pdf2docx img2pdf pypdf rapidocr_onnxruntime bottle_websocket bottle websocket comtypes win32api win32gui win32con ocrmypdf pikepdf pdfminer pluggy cv2 numpy
      
      - name: Build with build_modern.py
        working-directory: ./Baibaoxiang_Web
        run: python build_modern.py
      
      - name: Create Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $tag = "v$(Get-Date -Format 'yyyyMMdd.HHmmss')"
          echo "TAG=$tag" >> $env:GITHUB_ENV
          git tag $tag
          git push origin $tag
        shell: pwsh
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ./Baibaoxiang_Web/dist/main/Baibaoxiang.exe
          tag_name: ${{ env.TAG }}
