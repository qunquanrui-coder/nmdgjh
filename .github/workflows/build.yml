name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies and Build
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python build_modern.py
      
      - name: Verify build output
        run: |
          if (Test-Path "dist\main\main.exe") {
            Write-Host "Build output found!"
            Get-ChildItem dist\main\
          } else {
            Write-Error "Build output NOT found at dist\main\main.exe"
            exit 1
          }
        shell: pwsh
      
      - name: Create Release Tag
        id: tag_version
        run: |
          $tag = "v$(Get-Date -Format 'yyyyMMdd.HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag
        shell: pwsh
      
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/main/main.exe
          tag_name: ${{ steps.tag_version.outputs.tag }}
