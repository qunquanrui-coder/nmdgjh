name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies and Build
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python build_modern.py
      
      - name: Verify build output
        run: |
          Write-Host "=== dist/main contents ==="
          Get-ChildItem -Recurse dist\main\
          if (Test-Path "dist\main\main.exe") {
            Write-Host "`n[OK] main.exe found!"
          } else {
            Write-Error "[FAIL] main.exe NOT found"
            exit 1
          }
        shell: pwsh
      
      - name: Compress release package
        run: |
          $tag = "v$(Get-Date -Format 'yyyyMMdd.HHmmss')"
          Compress-Archive -Path dist\main\* -DestinationPath Baibaoxiang_$tag.zip -Force
          Write-Host "Package created: Baibaoxiang_$tag.zip"
          Get-ChildItem *.zip
          echo "PACKAGE_NAME=Baibaoxiang_$tag.zip" >> $env:GITHUB_OUTPUT
        shell: pwsh
      
      - name: Create Release Tag
        id: tag_version
        run: |
          $tag = "v$(Get-Date -Format 'yyyyMMdd.HHmmss')"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag
        shell: pwsh
      
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: Baibaoxiang_${{ steps.tag_version.outputs.tag }}.zip
          tag_name: ${{ steps.tag_version.outputs.tag }}
